<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anon Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --border:    #2a2a2a;
      --accent:    #00ff88;
      --accent-dim:#00cc6a;
      --text:      #e8e8e8;
      --muted:     #555;
      --mine-bg:   #00ff88;
      --mine-text: #0f0f0f;
      --their-bg:  #222;
      --their-text:#e8e8e8;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

    .screen { display: none; height: 100vh; }
    .screen.active { display: flex; }

    /* LOBBY */
    #lobby {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 40px 20px;
      position: relative;
    }

    #lobby::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(0,255,136,0.06) 0%, transparent 65%);
      pointer-events: none;
    }

    .logo { font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 32px; }
    .logo span { display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; vertical-align: middle; margin-right: 8px; animation: pulse 2s ease-in-out infinite; }

    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }

    .lobby-title { font-size: 42px; font-weight: 600; letter-spacing: -0.03em; margin-bottom: 8px; line-height: 1; text-align: center; }
    .lobby-sub { font-size: 14px; color: var(--muted); margin-bottom: 40px; font-family: var(--mono); }

    .action-card { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }

    input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 13px 16px;
      font-family: var(--sans);
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    .btn-primary { width: 100%; padding: 14px; background: var(--accent); color: var(--mine-text); border: none; border-radius: 8px; font-family: var(--sans); font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s, transform 0.1s; letter-spacing: -0.01em; }
    .btn-primary:hover  { background: var(--accent-dim); }
    .btn-primary:active { transform: scale(0.98); }

    #error-msg { font-family: var(--mono); font-size: 12px; color: #ff5555; min-height: 16px; text-align: center; }

    /* SEARCHING */
    #searching-screen { flex-direction: column; align-items: center; justify-content: center; gap: 20px; }

    .searching-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }

    .spinner { width: 40px; height: 40px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .searching-text { font-size: 18px; font-weight: 600; }

    .searching-name { font-family: var(--mono); font-size: 13px; color: var(--muted); }
    .searching-name span { color: var(--accent); }

    .btn-cancel { padding: 10px 24px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; font-family: var(--sans); font-size: 14px; cursor: pointer; transition: border-color 0.15s, color 0.15s; margin-top: 10px; }
    .btn-cancel:hover { border-color: #ff5555; color: #ff5555; }

    /* CHAT */
    #chat-screen { flex-direction: column; }

    #chat-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .status-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 2s ease-in-out infinite; flex-shrink: 0; }

    .header-names { display: flex; flex-direction: column; gap: 1px; }
    #partner-name-label { font-family: var(--mono); font-size: 13px; color: var(--text); }
    #my-name-label { font-family: var(--mono); font-size: 10px; color: var(--muted); }

    .btn-next { padding: 8px 16px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; font-family: var(--mono); font-size: 12px; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
    .btn-next:hover { border-color: var(--accent); color: var(--accent); }

    #chat-box { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 8px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    #chat-box::-webkit-scrollbar { width: 4px; }
    #chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-wrapper { display: flex; flex-direction: column; max-width: 50vw; min-width: 0; }
    .msg-wrapper.mine   { align-self: flex-end;  align-items: flex-end; }
    .msg-wrapper.theirs { align-self: flex-start; align-items: flex-start; }
    .msg-wrapper.system { align-self: center;     max-width: 80%; }

    .message { width: fit-content; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-wrap: break-word; overflow-wrap: break-word; word-break: break-word; white-space: pre-wrap; }
    .message.mine   { background: var(--mine-bg);  color: var(--mine-text);  border-bottom-right-radius: 4px; }
    .message.theirs { background: var(--their-bg); color: var(--their-text); border-bottom-left-radius: 4px; }
    .message.system { background: transparent; color: var(--muted); font-size: 12px; font-family: var(--mono); padding: 4px 10px; border: 1px solid var(--border); border-radius: 20px; width: auto; }

    .sender-name { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 4px; padding: 0 4px; }

    #disconnected-banner { display: none; background: var(--surface); border-top: 1px solid var(--border); padding: 14px 20px; text-align: center; font-family: var(--mono); font-size: 13px; color: var(--muted); flex-shrink: 0; }
    #disconnected-banner button { margin-left: 14px; padding: 6px 16px; background: var(--accent); color: var(--mine-text); border: none; border-radius: 6px; font-family: var(--sans); font-size: 13px; font-weight: 600; cursor: pointer; }

    #input-area { display: flex; padding: 14px 16px; background: var(--surface); border-top: 1px solid var(--border); gap: 10px; flex-shrink: 0; }
    #message-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; font-family: var(--sans); font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s; width: auto; }
    #message-input:focus    { border-color: var(--accent); }
    #message-input:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn { padding: 12px 20px; background: var(--accent); color: var(--mine-text); border: none; border-radius: 10px; font-family: var(--sans); font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; flex-shrink: 0; }
    #send-btn:hover    { background: var(--accent-dim); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- SCREEN 1: LOBBY -->
  <div id="lobby" class="screen active">
    <div class="logo"><span></span>anon_chat</div>
    <h1 class="lobby-title">No names.<br>No traces.</h1>
    <p class="lobby-sub">// ephemeral by design</p>

    <div class="action-card">
      <input
        id="username-input"
        type="text"
        placeholder="Enter your name..."
        maxlength="20"
        autocomplete="off"
      />
      <button class="btn-primary" id="find-btn">Find a Stranger</button>
      <p id="error-msg"></p>
    </div>
  </div>

  <!-- SCREEN 2: SEARCHING -->
  <div id="searching-screen" class="screen">
    <p class="searching-label">looking for someone</p>
    <div class="spinner"></div>
    <p class="searching-text">Searching...</p>
    <p class="searching-name">searching as <span id="searching-as">...</span></p>
    <button class="btn-cancel" id="cancel-btn">Cancel</button>
  </div>

  <!-- SCREEN 3: CHAT -->
  <div id="chat-screen" class="screen">
    <div id="chat-header">
      <div class="header-left">
        <div class="status-dot"></div>
        <div class="header-names">
          <span id="partner-name-label">Stranger</span>
          <span id="my-name-label">you: ...</span>
        </div>
      </div>
      <button class="btn-next" id="next-btn">Next →</button>
    </div>

    <div id="chat-box"></div>

    <div id="disconnected-banner">
      Stranger has disconnected.
      <button id="find-next-btn">Find Next</button>
    </div>

    <div id="input-area">
      <input id="message-input" type="text" placeholder="Type a message..." autocomplete="off" />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    let myName        = '';
    let currentRoomId = '';

    const lobby              = document.getElementById('lobby');
    const searchingScreen    = document.getElementById('searching-screen');
    const chatScreen         = document.getElementById('chat-screen');
    const usernameInput      = document.getElementById('username-input');
    const findBtn            = document.getElementById('find-btn');
    const errorMsg           = document.getElementById('error-msg');
    const searchingAs        = document.getElementById('searching-as');
    const cancelBtn          = document.getElementById('cancel-btn');
    const chatBox            = document.getElementById('chat-box');
    const messageInput       = document.getElementById('message-input');
    const sendBtn            = document.getElementById('send-btn');
    const partnerNameLabel   = document.getElementById('partner-name-label');
    const myNameLabel        = document.getElementById('my-name-label');
    const nextBtn            = document.getElementById('next-btn');
    const disconnectedBanner = document.getElementById('disconnected-banner');
    const findNextBtn        = document.getElementById('find-next-btn');

    function showScreen(screen) {
      [lobby, searchingScreen, chatScreen].forEach(s => s.classList.remove('active'));
      screen.classList.add('active');
    }

    function addMessage(text, type, from = '') {
      const wrapper = document.createElement('div');
      wrapper.classList.add('msg-wrapper', type);

      if (from && type === 'theirs') {
        const nameEl = document.createElement('div');
        nameEl.classList.add('sender-name');
        nameEl.textContent = from;
        wrapper.appendChild(nameEl);
      }

      const msg = document.createElement('div');
      msg.classList.add('message', type);
      msg.textContent = text;
      wrapper.appendChild(msg);
      chatBox.appendChild(wrapper);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function resetChat() {
      chatBox.innerHTML = '';
      disconnectedBanner.style.display = 'none';
      messageInput.disabled = false;
      sendBtn.disabled = false;
    }

    // ── SOCKET EVENTS ──

    socket.on('waiting', () => {
      showScreen(searchingScreen);
    });

    socket.on('matched', ({ roomId, partnerName }) => {
      currentRoomId = roomId;
      resetChat();
      partnerNameLabel.textContent = partnerName;
      myNameLabel.textContent      = 'you: ' + myName;
      addMessage('You are now connected with ' + partnerName, 'system');
      showScreen(chatScreen);
      messageInput.focus();
    });

    socket.on('message', ({ text, from }) => {
      addMessage(text, 'theirs', from);
    });

    socket.on('partner_left', () => {
      addMessage('Stranger has disconnected.', 'system');
      messageInput.disabled = true;
      sendBtn.disabled = true;
      disconnectedBanner.style.display = 'block';
    });

    // ── UI ACTIONS ──

    findBtn.addEventListener('click', () => {
      const name = usernameInput.value.trim();
      if (!name) {
        errorMsg.textContent = 'please enter a name first.';
        usernameInput.focus();
        return;
      }
      errorMsg.textContent    = '';
      myName                  = name;
      searchingAs.textContent = name;
      socket.emit('find_stranger', name);
    });

    usernameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') findBtn.click();
    });

    cancelBtn.addEventListener('click', () => {
      socket.disconnect();
      socket.connect();
      showScreen(lobby);
    });

    nextBtn.addEventListener('click', () => {
      socket.emit('next_stranger');
      resetChat();
      showScreen(searchingScreen);
    });

    findNextBtn.addEventListener('click', () => {
      socket.emit('find_stranger', myName);
      resetChat();
      showScreen(searchingScreen);
    });

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !currentRoomId) return;
      addMessage(text, 'mine');
      socket.emit('message', { roomId: currentRoomId, text });
      messageInput.value = '';
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

  </script>
</body>
</html>
